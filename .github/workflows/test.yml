name: Run Tests in Docker

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-in-docker:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env from secret
        run: |
          printf '%s\n' "$ENV_FILE" > .env
          chmod 600 .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Build Containers
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env build \
            --build-arg INSTALL_DEV=true

      - name: Start Services
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env up -d

      - name: Show Container Status
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env ps

      - name: Generate Laravel Application Key
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env exec -T laravel \
            php artisan key:generate --force

      - name: Initialize Database
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env exec -T laravel \
            php artisan migrate --seed --force

      - name: Execute Tests
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env exec -T laravel \
            ./vendor/bin/pest

      - name: Teardown
        if: always()
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env down -v
