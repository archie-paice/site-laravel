name: Run Tests in Docker

on:
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  test-in-docker:
    runs-on: ubuntu-latest 
    
    steps:
      - uses: actions/checkout@v4

      # 1. Create the .env file from secret
      - name: Create .env from secret
        run: |
          cat > .env <<'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

      # 2. Build the Stack (CRITICAL: Enable Dev Tools)
      # We pass INSTALL_DEV=true so Composer includes PHPUnit/Pest
      - name: Build Containers
        run: |
          docker compose -p test -f tests/docker-compose.yml --env-file .env build \
            --build-arg INSTALL_DEV=true

      # 3. Start the Stack
      - name: Start Services
        run: docker compose -p test --env-file .env -f tests/docker-compose.yml up -d

      # 4. Wait for Database and Run Migrations
      - name: Setup Database
        run: |
          docker compose -p test --env-file .env -f tests/docker-compose.yml exec -T laravel php artisan migrate --seed --force

      # 5. Run the Tests INSIDE the container
      - name: Execute Tests
        run: |
          docker compose -p test --env-file .env -f tests/docker-compose.yml exec -T laravel ./vendor/bin/pest

      # 6. Cleanup
      # Always run this to remove the containers and the testing volume
      - name: Teardown
        if: always()
        run: docker compose -p test --env-file .env -f tests/docker-compose.yml down -v