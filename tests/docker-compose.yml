services:
  laravel:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    env_file:
      - ../.env
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8080"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zjx_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge