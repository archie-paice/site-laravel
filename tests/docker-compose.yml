services:
  laravel:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    env_file:
      - ../.env
    volumes:
      - ../.env:/var/www/html/.env
    environment:
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: zjx_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8080"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zjx_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zjx_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge