services:
  laravel:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: 'true'
    env_file:
      - ../.env
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8080"]
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=zjx_test
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=zjx_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
