# docker compose --env-file ./.env -f ./deploy/docker-compose.yml up --build
# docker compose -f ./deploy/docker-compose.yml down -v
version: '3.8'

services:
  laravel:
    image: ghcr.io/zjx-artcc/site-laravel:${IMAGE_TAG:-master}
    restart: unless-stopped
    container_name: zjx-laravel
    build:
      context: ../
      dockerfile: ./deploy/Dockerfile
    volumes:
      # Use a named volume that will be populated from the built image on first create.
      - app_code:/var/www/html
      # Persist runtime uploads/storage separately
      - storage_data:/var/www/html/storage
    env_file:
        - ../.env
    ports:
      - "8080:80"
    networks:
      - laravel
    healthcheck:
        test: [ "CMD", "php", "artisan", "--version" ]
        interval: 10s
        timeout: 5s
        retries: 3
    depends_on:
        db:
            condition: service_healthy
        migrator:
            condition: service_completed_successfully

  queue:
      image: ghcr.io/zjx-artcc/site-laravel:${IMAGE_TAG:-master}
      container_name: laravel_queue
      restart: unless-stopped
      # Wait for DB to accept connections, then run the queue worker
      command: php artisan queue:work
      env_file:
          -   ../.env
      networks:
          - laravel
      depends_on:
          db:
              condition: service_healthy
          migrator:
              condition: service_completed_successfully

  scheduler:
      image: ghcr.io/zjx-artcc/site-laravel:${IMAGE_TAG:-master}
      container_name: laravel_scheduler
      restart: unless-stopped
      command: php artisan schedule:work
      # Wait for DB to accept connections, then run the scheduler
      env_file:
          - ../.env
      networks:
          - laravel
      depends_on:
          db:
              condition: service_healthy
          migrator:
              condition: service_completed_successfully

  migrator:
      image: ghcr.io/zjx-artcc/site-laravel:${IMAGE_TAG:-master}
      deploy:
          restart_policy:
              condition: on-failure
      command: [ "php", "artisan", "migrate", "--seed", "--force" ]
      env_file:
          - ../.env
      depends_on:
          db:
            condition: service_healthy
      networks:
          - laravel

  db:
      image: postgres:16  # <--- FIXED: Pinned version to prevent "latest" breaking changes
      restart: always
      env_file:
          - ../.env
      environment:
          POSTGRES_DB: ${DB_DATABASE}
          POSTGRES_USER: ${DB_USERNAME}
          POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
          - db_data:/var/lib/postgresql/data
      networks:
          - laravel
      healthcheck:
          test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
          interval: 5s
          timeout: 5s
          retries: 5
          start_period: 10s

  nginx:
    image: nginx:alpine
    # Mount the application code from the named volume populated from the built image.
    volumes:
        - app_code:/var/www/html:ro
    # Use docker config instead of bind-mounting the host nginx.conf
    configs:
        - source: nginx_conf
          target: /etc/nginx/conf.d/default.conf
    depends_on:
        laravel:
          condition: service_healthy
        db:
          condition: service_healthy

    ports:
        - "80:80"
    networks:
        - laravel

networks:
  laravel:
    driver: bridge

volumes:
    db_data:
    app_code:
    storage_data:

# Add a Compose config to inject nginx.conf into the nginx container (no host bind)
configs:
  nginx_conf:
    file: ./nginx.conf
