# docker compose --env-file ./.env.prod -f ./deploy/docker-compose.yml up --build
version: '3.8'

services:
  laravel:
    image: ghcr.io/zjx-artcc/site-laravel:master
    restart: unless-stopped
    container_name: zjx-laravel
    build:
      context: ../
      dockerfile: ./deploy/Dockerfile
    volumes:
      - ../storage/app:/var/www/html/storage/app
    env_file:
        - ../.env.prod
    ports:
      - "8080:80"
    networks:
      - laravel
    depends_on:
        -   db

  queue:
    image: ghcr.io/zjx-artcc/site-laravel:master
    container_name: laravel_queue
    restart: unless-stopped
    # Overwrite the default command to run the queue worker
    command: php artisan queue:work --tries=3 --timeout=90
    env_file:
        -   ../.env.prod
    networks:
        - laravel
    depends_on:
        - laravel
        - db

  scheduler:
    image: ghcr.io/zjx-artcc/site-laravel:master
    container_name: laravel_scheduler
    restart: unless-stopped
    # "schedule:work" runs the scheduler in the foreground (available in Laravel 8+)
    command: php artisan schedule:work
    networks:
        - laravel
    depends_on:
        - laravel

  db:
      image: postgres:latest
      restart: always
      env_file:
          - ../.env.prod
      environment:
          POSTGRES_DB: ${DB_DATABASE}
          POSTGRES_USER: ${DB_USERNAME}
          POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
          - db_data:/var/lib/postgres
      networks:
          - laravel

networks:
  laravel:
    driver: bridge

volumes:
    db_data:
